<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>BTC 策略監測</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #0d0d0d; --card: #1a1a1a; --border: #2a2a2a;
    --text: #e8e8e8; --sub: #888; --gold: #f5a623;
    --green: #34c759; --red: #ff3b30;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, "SF Pro Display", sans-serif; max-width: 480px; margin: 0 auto; padding: 0 0 40px; }

  /* Header */
  .header { padding: 16px 16px 12px; position: sticky; top: 0; background: var(--bg); z-index: 20; border-bottom: 1px solid var(--border); }
  .header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .header-title { font-size: 12px; color: var(--sub); text-transform: uppercase; letter-spacing: 0.5px; }
  .btc-price { font-size: 30px; font-weight: 700; color: var(--gold); }
  .last-update { font-size: 11px; color: var(--sub); margin-top: 2px; }
  .refresh-btn { background: var(--card); border: 1px solid var(--border); color: var(--text); padding: 8px 14px; border-radius: 20px; font-size: 13px; cursor: pointer; display: flex; align-items: center; gap: 5px; }
  .refresh-btn:active { background: #252525; }
  .spin { display: inline-block; }
  .refresh-btn.loading .spin { animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Tab bar */
  .tabs { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 2px; }
  .tabs::-webkit-scrollbar { display: none; }
  .tab { padding: 6px 14px; border-radius: 16px; font-size: 13px; font-weight: 600; cursor: pointer; white-space: nowrap; border: 1px solid var(--border); color: var(--sub); background: transparent; flex-shrink: 0; }
  .tab.active { background: var(--gold); color: #000; border-color: var(--gold); }

  /* Comparison grid (overview tab) */
  .overview-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 16px; }
  .ov-card { background: var(--card); border-radius: 14px; padding: 14px; cursor: pointer; }
  .ov-card:active { background: #222; }
  .ov-label { font-size: 11px; color: var(--sub); margin-bottom: 4px; }
  .ov-name  { font-size: 13px; font-weight: 700; margin-bottom: 8px; }
  .ov-return { font-size: 22px; font-weight: 700; }
  .ov-trades { font-size: 11px; color: var(--sub); margin-top: 4px; }
  .ov-status { font-size: 11px; margin-top: 6px; padding: 3px 8px; border-radius: 6px; display: inline-block; }
  .ov-status.holding { background: #0a2218; color: var(--green); }
  .ov-status.empty   { background: #1e1e1e; color: var(--sub); }

  /* Strategy detail view */
  .section { padding: 16px 16px 0; }
  .section-label { font-size: 11px; color: var(--sub); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 10px; }

  .status-banner { margin: 12px 16px 0; padding: 12px 16px; border-radius: 14px; display: flex; align-items: center; gap: 10px; }
  .status-banner.empty   { background: #1c1c1c; }
  .status-banner.holding { background: #0a2218; border: 1px solid #1a4a2e; }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .dot-empty   { background: #555; }
  .dot-holding { background: var(--green); box-shadow: 0 0 8px var(--green); }
  .status-text { font-size: 14px; font-weight: 600; }
  .status-sub  { font-size: 11px; color: var(--sub); margin-top: 2px; }

  .cards { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .card { background: var(--card); border-radius: 14px; padding: 14px 16px; }
  .card-label { font-size: 11px; color: var(--sub); margin-bottom: 6px; }
  .card-value { font-size: 21px; font-weight: 700; line-height: 1.1; }
  .card-sub   { font-size: 11px; color: var(--sub); margin-top: 4px; }
  .green { color: var(--green); } .red { color: var(--red); } .gold { color: var(--gold); } .white { color: #fff; }

  .log-list { display: flex; flex-direction: column; gap: 8px; }
  .log-item { background: var(--card); border-radius: 14px; padding: 14px; display: flex; gap: 12px; }
  .log-icon { font-size: 15px; flex-shrink: 0; margin-top: 1px; }
  .log-body { flex: 1; }
  .log-time  { font-size: 11px; color: var(--sub); margin-bottom: 4px; }
  .log-row   { display: flex; justify-content: space-between; align-items: center; margin-bottom: 3px; }
  .log-price { font-size: 16px; font-weight: 700; }
  .log-badge { font-size: 12px; font-weight: 600; padding: 2px 9px; border-radius: 7px; }
  .badge-wait   { background: #222; color: #666; }
  .badge-signal { background: #3d2e00; color: var(--gold); }
  .log-meta { font-size: 11px; color: var(--sub); }

  .trade-list { display: flex; flex-direction: column; gap: 8px; }
  .trade-item { background: var(--card); border-radius: 14px; padding: 14px; }
  .trade-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 7px; }
  .trade-badge { font-size: 12px; font-weight: 700; padding: 3px 11px; border-radius: 7px; }
  .badge-buy       { background: #0a2218; color: var(--green); }
  .badge-sell-win  { background: #0a2218; color: var(--green); }
  .badge-sell-loss { background: #220a0a; color: var(--red); }
  .trade-time { font-size: 11px; color: var(--sub); }
  .trade-row { display: flex; justify-content: space-between; }
  .trade-price { font-size: 15px; font-weight: 600; }
  .trade-pnl   { font-size: 16px; font-weight: 700; }
  .trade-reason { font-size: 11px; color: var(--sub); margin-top: 5px; }

  .empty-state { text-align: center; padding: 28px; color: var(--sub); font-size: 13px; }
  .hidden { display: none !important; }

  /* 交易明細 Modal */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 100; display: flex; align-items: flex-end; }
  .modal-overlay.hidden { display: none !important; }
  .modal-sheet { background: var(--card); border-radius: 22px 22px 0 0; width: 100%; max-height: 82vh; overflow-y: auto; padding: 0 0 44px; animation: slideUp 0.22s ease; }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  .modal-handle { width: 38px; height: 4px; background: #3a3a3a; border-radius: 2px; margin: 14px auto 0; }
  .modal-head { padding: 16px 20px 10px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
  .modal-title { font-size: 15px; font-weight: 700; }
  .modal-close { font-size: 20px; color: var(--sub); cursor: pointer; line-height: 1; padding: 4px 4px 4px 12px; }
  .modal-summary { display: flex; gap: 0; border-bottom: 1px solid var(--border); }
  .modal-stat { flex: 1; text-align: center; padding: 12px 4px; }
  .modal-stat-v { font-size: 17px; font-weight: 700; }
  .modal-stat-l { font-size: 10px; color: var(--sub); margin-top: 2px; }
  .pair-list { padding: 12px 16px 0; display: flex; flex-direction: column; gap: 10px; }
  .pair-card { background: #111; border-radius: 14px; overflow: hidden; }
  .pair-card.open { border: 1px solid #1a4a2e; }
  .pair-row { display: flex; align-items: center; padding: 11px 14px; gap: 10px; }
  .pair-row + .pair-row { border-top: 1px solid #1e1e1e; }
  .pair-badge { font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 6px; flex-shrink: 0; min-width: 42px; text-align: center; }
  .pb-buy  { background: #0a2218; color: var(--green); }
  .pb-sell-win  { background: #0a2218; color: var(--green); }
  .pb-sell-loss { background: #220a0a; color: var(--red); }
  .pb-open { background: #2a1e00; color: var(--gold); }
  .pair-info { flex: 1; }
  .pair-price { font-size: 15px; font-weight: 700; }
  .pair-qty   { font-size: 11px; color: var(--sub); margin-top: 1px; }
  .pair-right { text-align: right; flex-shrink: 0; }
  .pair-pnl   { font-size: 16px; font-weight: 700; }
  .pair-time  { font-size: 10px; color: var(--sub); margin-top: 2px; }
  .pair-reason { padding: 6px 14px 10px; font-size: 11px; color: var(--sub); }

  /* ov-card 交易筆數可點擊 */
  .ov-trades-btn { font-size: 11px; color: var(--gold); margin-top: 4px; cursor: pointer; display: inline-block; text-decoration: underline dotted; }

  @media (min-width: 520px) { body { max-width: 600px; } .cards { grid-template-columns: repeat(3, 1fr); } }
</style>
</head>
<body>

<div class="header">
  <div class="header-row">
    <div>
      <div class="header-title">BTC 策略 A/B/C/D 監測</div>
      <div class="btc-price" id="btc-price">—</div>
      <div class="last-update" id="last-update">點擊更新</div>
    </div>
    <button class="refresh-btn" id="refresh-btn" onclick="doRefresh()">
      <span class="spin">↻</span>更新
    </button>
  </div>
  <div class="tabs">
    <div class="tab active" onclick="switchAsset('overview')">總覽</div>
    <div class="tab" onclick="switchAsset('BTC')">BTC</div>
    <div class="tab" onclick="switchAsset('ETH')">ETH</div>
  </div>
</div>

<!-- 交易明細 Modal -->
<div class="modal-overlay hidden" id="trade-modal-overlay" onclick="closeTradeModal(event)">
  <div class="modal-sheet" id="trade-modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-head">
      <div class="modal-title" id="modal-title">交易明細</div>
      <div class="modal-close" onclick="closeTradeModal()">✕</div>
    </div>
    <div class="modal-summary" id="modal-summary"></div>
    <div class="pair-list" id="modal-pair-list"></div>
  </div>
</div>

<!-- 總覽 -->
<div id="view-overview">
  <div class="section" style="padding:16px 16px 0">
    <div class="section-label">本金變化（六策略比較）</div>
    <div style="background:var(--card); border-radius:14px; padding:12px 8px;">
      <canvas id="equity-chart" height="200"></canvas>
    </div>
  </div>
  <div class="overview-grid" id="overview-grid">
    <div class="empty-state" style="grid-column:1/-1">載入中...</div>
  </div>
</div>

<!-- 策略詳細頁 -->
<div id="view-detail" class="hidden">
  <!-- 子選單 -->
  <div style="padding: 12px 16px 0">
    <div class="tabs" id="sub-tabs"></div>
  </div>
  <div id="status-banner" class="status-banner empty">
    <span class="status-dot dot-empty"></span>
    <div><div class="status-text" style="color:#666">載入中...</div></div>
  </div>

  <div class="section" style="margin-top:16px">
    <div class="section-label" id="strategy-name-label">帳戶概覽</div>
    <div class="cards">
      <div class="card"><div class="card-label">總資產</div><div class="card-value white" id="c-total">—</div><div class="card-sub" id="c-total-sub">初始 $1,000</div></div>
      <div class="card"><div class="card-label">現金餘額</div><div class="card-value white" id="c-cash">—</div><div class="card-sub" id="c-cash-sub">可用 USDT</div></div>
      <div class="card"><div class="card-label">累計報酬</div><div class="card-value white" id="c-return">—</div></div>
      <div class="card"><div class="card-label">已實現損益</div><div class="card-value white" id="c-pnl">—</div></div>
      <div class="card"><div class="card-label">交易次數</div><div class="card-value white" id="c-trades">—</div></div>
      <div class="card"><div class="card-label">勝率</div><div class="card-value white" id="c-wr">—</div></div>
    </div>
  </div>

  <div class="section" style="margin-top:20px">
    <div class="section-label">最近監測</div>
    <div class="log-list" id="log-list"><div class="empty-state">載入中...</div></div>
  </div>

  <div class="section" id="trade-section" style="margin-top:20px; display:none">
    <div class="section-label">交易紀錄</div>
    <div class="trade-list" id="trade-list"></div>
  </div>
</div>

<script>
const GS_URL = "https://script.google.com/macros/s/AKfycbya4n2VkmvWcc6Rswq2wWqA26w5Pa94xb3w-3DSjVyMYAE8_t-dRLFvJBOWS_hAmUg/exec";
const STRATEGY_LABELS = {
  A:"BTC 布林+MACD+RSI", B:"BTC RSI(9)<40", C:"BTC EMA13/48", D:"BTC MACD信號線",
  ETH_B:"ETH RSI(9)<40", ETH_C:"ETH EMA13/48"
};

let allData = null;
let activeAsset = "overview";
let activeStrat = "A";

const ASSET_STRATS = { BTC: ["A","B","C","D"], ETH: ["ETH_B","ETH_C"] };
const SUB_LABELS   = { A:"策略A", B:"策略B", C:"策略C", D:"策略D", ETH_B:"策略B", ETH_C:"策略C" };

function toTW(utcStr) {
  if (!utcStr) return "—";
  try {
    const d = new Date(String(utcStr).replace(" ","T") + (String(utcStr).includes("Z") ? "" : "Z"));
    return d.toLocaleString("zh-TW", { timeZone:"Asia/Taipei", month:"numeric", day:"numeric", hour:"2-digit", minute:"2-digit", hour12:false });
  } catch(e) { return utcStr; }
}
function toTWDual(utcStr) {
  if (!utcStr) return "—";
  try {
    const d = new Date(String(utcStr).replace(" ","T") + (String(utcStr).includes("Z") ? "" : "Z"));
    const tw = d.toLocaleString("zh-TW", { timeZone:"Asia/Taipei", month:"numeric", day:"numeric", hour:"2-digit", minute:"2-digit", hour12:false });
    const utcH = String(d.getUTCHours()).padStart(2,"0");
    const utcM = String(d.getUTCMinutes()).padStart(2,"0");
    return `<span>${tw} 台北</span><span style="color:#888;font-size:0.78em;margin-left:6px">UTC ${utcH}:${utcM}</span>`;
  } catch(e) { return utcStr; }
}

function switchAsset(asset) {
  activeAsset = asset;
  document.querySelectorAll(".tab").forEach((el, i) => {
    el.classList.toggle("active", ["overview","BTC","ETH"][i] === asset);
  });
  document.getElementById("view-overview").classList.toggle("hidden", asset !== "overview");
  document.getElementById("view-detail").classList.toggle("hidden", asset === "overview");
  if (asset !== "overview") {
    const strats = ASSET_STRATS[asset];
    activeStrat = strats[0];
    buildSubTabs(asset);
    if (allData) renderDetail(activeStrat);
  }
}

function buildSubTabs(asset) {
  const strats = ASSET_STRATS[asset];
  document.getElementById("sub-tabs").innerHTML = strats.map(s =>
    `<div class="tab ${s === activeStrat ? 'active' : ''}" onclick="switchStrat('${s}')">${SUB_LABELS[s]}</div>`
  ).join("");
}

function switchStrat(s) {
  activeStrat = s;
  buildSubTabs(activeAsset);
  if (allData) renderDetail(s);
}

function goToStrat(asset, strat) {
  activeAsset = asset;
  activeStrat = strat;
  document.querySelectorAll(".tab").forEach((el, i) => {
    el.classList.toggle("active", ["overview","BTC","ETH"][i] === asset);
  });
  document.getElementById("view-overview").classList.add("hidden");
  document.getElementById("view-detail").classList.remove("hidden");
  buildSubTabs(asset);
  if (allData) renderDetail(strat);
}

let chartInstance = null;
function tsToMs(t) {
  if (!t) return null;
  const d = new Date(String(t).replace(" ","T") + (String(t).includes("Z") ? "" : "Z"));
  return d.getTime();
}
function renderChart(data) {
  const colors = { A:"#f5a623", B:"#34c759", C:"#5ac8fa", D:"#ff9500", ETH_B:"#bf5af2", ETH_C:"#ff3b30" };
  const datasets = ["A","B","C","D","ETH_B","ETH_C"].map(s => {
    const hist = data[s]?.history || [];
    return {
      label: STRATEGY_LABELS[s],
      data: hist.map(r => ({ x: tsToMs(r[0]), y: parseFloat(r[1]) })).filter(p => p.x && !isNaN(p.y)),
      borderColor: colors[s],
      backgroundColor: "transparent",
      borderWidth: 2,
      pointRadius: 0,
      tension: 0.15,
    };
  }).filter(d => d.data.length > 0);

  const canvas = document.getElementById("equity-chart");
  if (!canvas) return;
  if (chartInstance) { chartInstance.destroy(); chartInstance = null; }
  if (datasets.length === 0) return;

  chartInstance = new Chart(canvas.getContext("2d"), {
    type: "line",
    data: { datasets },
    options: {
      maintainAspectRatio: false,
      interaction: { mode: "nearest", intersect: false },
      scales: {
        x: {
          type: "linear",
          ticks: { color: "#888", font: { size: 9 }, maxTicksLimit: 5,
            callback: (v) => toTW(new Date(v).toISOString()) },
          grid: { color: "#222" },
        },
        y: {
          ticks: { color: "#888", font: { size: 9 } },
          grid: { color: "#222" },
        },
      },
      plugins: {
        legend: { labels: { color: "#ccc", boxWidth: 10, font: { size: 10 } } },
      },
    },
  });
}

function renderOverview(data) {
  const priceA = data.A?.dashboard?.["BTC 現價"] || "—";
  document.getElementById("btc-price").textContent = priceA;
  document.getElementById("last-update").textContent =
    "資料時間：" + toTW(data.A?.dashboard?.["最後更新"]) + " 台灣時間";

  const grid = document.getElementById("overview-grid");
  grid.innerHTML = ["A","B","C","D","ETH_B","ETH_C"].map(s => {
    const d   = data[s]?.dashboard || {};
    const ret = d["累計報酬"] || "0%";
    const retN = parseFloat(ret);
    const cls  = retN > 0 ? "green" : retN < 0 ? "red" : "white";
    const pos  = d["持倉狀態"] || "空倉中";
    const isHolding = pos !== "空倉中";
    const trades = d["總交易次數"] || 0;
    const wr     = d["勝率"] || "—";
    const hasT   = parseInt(trades) > 0;
    const asset  = s.startsWith('ETH') ? 'ETH' : 'BTC';
    return `<div class="ov-card" onclick="goToStrat('${asset}','${s}')">
      <div class="ov-label">策略${s}</div>
      <div class="ov-name">${STRATEGY_LABELS[s]}</div>
      <div class="ov-return ${cls}">${ret}</div>
      ${hasT
        ? `<div class="ov-trades-btn" onclick="event.stopPropagation(); showTradeModal('${s}')">${trades} 筆 · 勝率 ${wr} ▸</div>`
        : `<div class="ov-trades">0 筆</div>`}
      <div class="ov-status ${isHolding ? 'holding':'empty'}">${isHolding ? '持倉中' : '空倉'}</div>
    </div>`;
  }).join("");
}

function renderDetail(s) {
  const data   = allData[s] || {};
  const d      = data.dashboard || {};
  const logs   = data.logs   || [];
  const trades = data.trades || [];

  document.getElementById("strategy-name-label").textContent =
    `策略${s}：${STRATEGY_LABELS[s]} — 帳戶概覽`;

  const pos = d["持倉狀態"] || "空倉中";
  const isHolding = pos !== "空倉中";
  const banner = document.getElementById("status-banner");
  if (isHolding) {
    banner.className = "status-banner holding";
    banner.innerHTML = `<span class="status-dot dot-holding"></span>
      <div><div class="status-text green">持倉中</div><div class="status-sub">${pos}</div></div>`;
  } else {
    banner.className = "status-banner empty";
    banner.innerHTML = `<span class="status-dot dot-empty"></span>
      <div><div class="status-text" style="color:#aaa">空倉中</div>
      <div class="status-sub">等待進場訊號</div></div>`;
  }

  const retStr = d["累計報酬"] || "0%";
  const retN   = parseFloat(retStr);
  const pnlStr = d["累計已實現損益"] || "$0.00";
  const pnlN   = parseFloat(String(pnlStr).replace(/[$,]/g,""));
  const totalAssets = (1000 * (1 + retN / 100)).toFixed(2);

  document.getElementById("c-total").textContent    = "$" + parseFloat(totalAssets).toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2});
  document.getElementById("c-total").className      = "card-value " + (retN >= 0 ? "green" : "red");
  document.getElementById("c-total-sub").textContent = (retN >= 0 ? "+" : "") + retStr + " 較初始";
  const cashRaw = d["現金餘額"];
  const nocash  = !cashRaw || cashRaw === "—";
  document.getElementById("c-cash").textContent     = nocash ? "持倉中" : cashRaw;
  document.getElementById("c-cash").className       = "card-value " + (nocash ? "gold" : "white");
  document.getElementById("c-cash-sub").textContent = nocash ? "資金已買入 BTC" : "可用 USDT";
  document.getElementById("c-return").textContent   = retStr;
  document.getElementById("c-return").className     = "card-value " + (retN >= 0 ? "green" : "red");
  document.getElementById("c-pnl").textContent      = pnlStr;
  document.getElementById("c-pnl").className        = "card-value " + (pnlN >= 0 ? "green" : "red");
  const tradeCount = d["總交易次數"] || "0";
  const tradeEl2 = document.getElementById("c-trades");
  if (parseInt(tradeCount) > 0) {
    tradeEl2.innerHTML = `<span style="cursor:pointer;text-decoration:underline dotted;color:var(--gold)" onclick="showTradeModal('${s}')">${tradeCount}</span>`;
  } else {
    tradeEl2.textContent = tradeCount;
  }
  document.getElementById("c-wr").textContent       = d["勝率"] || "—";

  const logEl = document.getElementById("log-list");
  if (!logs.length) {
    logEl.innerHTML = '<div class="empty-state">尚無監測資料</div>';
  } else {
    logEl.innerHTML = logs.map(r => {
      const hasSignal = r[7] && r[7] !== "無訊號";
      const priceFmt = "$" + parseFloat(r[1]||0).toLocaleString("en-US",{maximumFractionDigits:0});
      return `<div class="log-item">
        <div class="log-icon">${hasSignal ? "⚡" : "·"}</div>
        <div class="log-body">
          <div class="log-time">${toTWDual(r[0])}</div>
          <div class="log-row">
            <span class="log-price">${priceFmt}</span>
            <span class="log-badge ${hasSignal ? "badge-signal":"badge-wait"}">${hasSignal ? r[7] : "待機"}</span>
          </div>
          <div class="log-meta">${r[5]} &nbsp;·&nbsp; ${r[6]}</div>
        </div>
      </div>`;
    }).join("");
  }

  const tradeSection = document.getElementById("trade-section");
  const tradeEl      = document.getElementById("trade-list");
  if (!trades.length) {
    tradeSection.style.display = "none";
  } else {
    tradeSection.style.display = "block";
    tradeEl.innerHTML = trades.map(r => {
      const isBuy  = r[1] === "BUY";
      const pnlPct = r[4] || "";
      const isWin  = pnlPct.startsWith("+");
      const badgeCls = isBuy ? "badge-buy" : (isWin ? "badge-sell-win" : "badge-sell-loss");
      const pnlCls   = isBuy ? "white" : (isWin ? "green" : "red");
      const priceFmt = "$" + parseFloat(r[2]||0).toLocaleString("en-US",{maximumFractionDigits:0});
      return `<div class="trade-item">
        <div class="trade-header">
          <span class="trade-badge ${badgeCls}">${isBuy ? "買入" : "賣出"}</span>
          <span class="trade-time">${toTW(r[0])}</span>
        </div>
        <div class="trade-row">
          <span class="trade-price">${priceFmt}</span>
          <span class="trade-pnl ${pnlCls}">${isBuy ? "進場" : (pnlPct || "—")}</span>
        </div>
        ${r[6] ? `<div class="trade-reason">${r[6]}</div>` : ""}
      </div>`;
    }).join("");
  }
}

function closeTradeModal(e) {
  if (e && e.target !== document.getElementById("trade-modal-overlay")) return;
  document.getElementById("trade-modal-overlay").classList.add("hidden");
}

function showTradeModal(stratKey) {
  const data   = allData?.[stratKey];
  if (!data) return;
  const trades = data.trades || [];
  const d      = data.dashboard || {};

  document.getElementById("modal-title").textContent = `策略${stratKey} 交易明細`;

  // 摘要列
  const total  = parseInt(d["總交易次數"] || 0);
  const wlStr  = String(d["勝 / 敗"] || "");
  const wins   = parseInt(wlStr.match(/^(\d+)/)?.[1] || 0);
  const losses = total - wins;
  const pnlRaw = d["累計已實現損益"] || "$0.00";
  const wr     = d["勝率"] || "—";
  const pnlN   = parseFloat(String(pnlRaw).replace(/[$,]/g,""));
  document.getElementById("modal-summary").innerHTML = `
    <div class="modal-stat"><div class="modal-stat-v">${total}</div><div class="modal-stat-l">總交易</div></div>
    <div class="modal-stat"><div class="modal-stat-v green">${wins}</div><div class="modal-stat-l">獲利</div></div>
    <div class="modal-stat"><div class="modal-stat-v red">${losses}</div><div class="modal-stat-l">虧損</div></div>
    <div class="modal-stat"><div class="modal-stat-v">${wr}</div><div class="modal-stat-l">勝率</div></div>
    <div class="modal-stat"><div class="modal-stat-v ${pnlN>=0?'green':'red'}">${pnlRaw}</div><div class="modal-stat-l">已實現損益</div></div>`;

  // 格式化損益百分比 — Sheets 把 "-1.07%" 字串自動轉成數字 -0.0107，需做兩手處理
  function fmtPnlPct(raw) {
    if (raw === "" || raw === null || raw === undefined) return "";
    if (typeof raw === "number") {
      const pct = raw * 100;
      return (pct >= 0 ? "+" : "") + pct.toFixed(2) + "%";
    }
    return String(raw);
  }

  // 格式化金額
  function fmtUSD(n) {
    return "$" + parseFloat(n || 0).toLocaleString("en-US", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  }
  function fmtPrice(n) {
    return "$" + parseFloat(n || 0).toLocaleString("en-US", { maximumFractionDigits: 1 });
  }

  // 配對買賣（trades 是新→舊，index 0 最新）
  // 跳過連續兩個 SELL 的情況（重複記錄）
  const COMMISSION = 0.001;
  const pairs = [];
  let i = 0;
  while (i < trades.length) {
    const r      = trades[i];
    const action = String(r[1] || "").trim();
    if (action === "SELL") {
      // 往後找最近的 BUY，跳過連續 SELL（重複）
      let j = i + 1;
      while (j < trades.length && String(trades[j][1] || "").trim() === "SELL") j++;
      const buy = j < trades.length ? trades[j] : null;
      pairs.push({ sell: r, buy });
      i = j + 1;
    } else {
      // BUY 沒有配對 SELL = 目前持倉中
      pairs.push({ sell: null, buy: r });
      i += 1;
    }
  }

  document.getElementById("modal-pair-list").innerHTML = pairs.map((p) => {
    const isOpen = !p.sell;
    const buy    = p.buy;
    const sell   = p.sell;

    const buyPriceN  = parseFloat(buy?.[2] || 0);
    const sellPriceN = parseFloat(sell?.[2] || 0);
    const qty        = parseFloat(buy?.[3] || sell?.[3] || 0);
    const cost       = buyPriceN  * qty * (1 + COMMISSION);
    const proceeds   = sellPriceN * qty * (1 - COMMISSION);
    const pnlAmt     = proceeds - cost;

    const pnlPct  = fmtPnlPct(sell?.[4]);
    const isWin   = pnlPct.startsWith("+");
    const pnlCls  = !pnlPct ? "" : (isWin ? "green" : "red");
    const sellBadge = isWin ? "pb-sell-win" : "pb-sell-loss";
    const reason  = sell ? sell[6] : (buy ? buy[6] : "");

    return `<div class="pair-card ${isOpen ? 'open' : ''}">
      <div class="pair-row">
        <span class="pair-badge pb-buy">買入</span>
        <div class="pair-info">
          <div class="pair-price">${fmtPrice(buyPriceN)}</div>
          <div class="pair-qty">數量 ${qty.toFixed(4)} · 成本 ${fmtUSD(cost)}</div>
        </div>
        <div class="pair-right">
          <div class="pair-pnl" style="color:var(--sub);font-size:12px">進場</div>
          <div class="pair-time">${buy ? toTW(buy[0]) : "—"}</div>
        </div>
      </div>
      ${isOpen
        ? `<div class="pair-row"><span class="pair-badge pb-open">持倉中</span><div class="pair-info" style="color:var(--gold);font-size:13px">等待出場訊號</div></div>`
        : `<div class="pair-row">
            <span class="pair-badge ${sellBadge}">賣出</span>
            <div class="pair-info">
              <div class="pair-price">${fmtPrice(sellPriceN)}</div>
              <div class="pair-qty">所得 ${fmtUSD(proceeds)} · 損益 <span class="${pnlCls}">${fmtUSD(pnlAmt)}</span></div>
            </div>
            <div class="pair-right">
              <div class="pair-pnl ${pnlCls}">${pnlPct || "—"}</div>
              <div class="pair-time">${sell ? toTW(sell[0]) : "—"}</div>
            </div>
          </div>
          ${reason ? `<div class="pair-reason">${reason}</div>` : ""}`
      }
    </div>`;
  }).join("") || '<div class="empty-state">尚無交易紀錄</div>';

  document.getElementById("trade-modal-overlay").classList.remove("hidden");
}

let loading = false;
async function doRefresh() {
  if (loading) return;
  loading = true;
  document.getElementById("refresh-btn").classList.add("loading");
  document.getElementById("last-update").textContent = "更新中...";
  try {
    const resp = await fetch(GS_URL + "?t=" + Date.now());
    allData = await resp.json();
    renderOverview(allData);
    renderChart(allData);
    if (activeAsset !== "overview") renderDetail(activeStrat);
    document.getElementById("last-update").textContent =
      "資料時間：" + toTW(allData.A?.dashboard?.["最後更新"]) + " 台灣時間";
  } catch(e) {
    document.getElementById("last-update").textContent = "⚠️ 連線失敗，請再試";
  }
  loading = false;
  document.getElementById("refresh-btn").classList.remove("loading");
}

doRefresh();
setInterval(doRefresh, 300000);
</script>
