<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 交易戰情室</title>
<style>
:root{
  --surface:#16161d; --card:#1e1e27; --card2:#24242f; --line:#32323e;
  --ink:#f2f2f5; --ink2:#a8a8b5; --ink3:#6c6c78;
  --s1:#3987e5; --s2:#199e70; --s3:#c98500;
  --good:#1fbf83; --bad:#e66767; --warn:#c98500;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--surface);color:var(--ink);font-family:-apple-system,"PingFang TC","Noto Sans TC",sans-serif;padding:16px;max-width:1080px;margin:0 auto}
h1{font-size:1.25rem;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
h2{font-size:.95rem;color:var(--ink2);margin:26px 0 10px;font-weight:600}
.pill{font-size:.72rem;padding:3px 10px;border-radius:99px;border:1px solid var(--line);color:var(--ink2)}
.pill.ok{color:var(--good);border-color:var(--good)}
.pill.bad{color:var(--bad);border-color:var(--bad)}
.sub{color:var(--ink3);font-size:.78rem;margin-top:6px}
.grid{display:grid;gap:12px}
.tiles{grid-template-columns:repeat(auto-fit,minmax(150px,1fr))}
.tile{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px}
.tile .k{font-size:.75rem;color:var(--ink2)}
.tile .v{font-size:1.45rem;font-weight:700;margin-top:4px;font-variant-numeric:tabular-nums}
.tile .d{font-size:.72rem;color:var(--ink3);margin-top:4px}
.pos{color:var(--good)} .neg{color:var(--bad)}
.race{grid-template-columns:repeat(auto-fit,minmax(220px,1fr))}
.card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px}
.card .name{display:flex;align-items:center;gap:8px;font-weight:600;font-size:.9rem}
.dot{width:10px;height:10px;border-radius:50%;flex:none}
.card .ret{font-size:1.6rem;font-weight:700;margin:6px 0 2px;font-variant-numeric:tabular-nums}
.card .meta{font-size:.75rem;color:var(--ink2)}
.lead{outline:2px solid var(--s2);outline-offset:1px}
#chartwrap{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px;overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:.8rem;font-variant-numeric:tabular-nums}
th{color:var(--ink3);font-weight:500;text-align:left;padding:7px 8px;border-bottom:1px solid var(--line)}
td{padding:7px 8px;border-bottom:1px solid var(--card2);color:var(--ink2)}
td:first-child{color:var(--ink3)}
.tag{font-size:.7rem;padding:1px 7px;border-radius:99px;background:var(--card2)}
footer{color:var(--ink3);font-size:.72rem;margin:26px 0 8px;text-align:center}
</style>
</head>
<body>
<h1>⚡ AI 交易戰情室
  <span class="pill" id="hb">排程檢查中…</span>
  <span class="pill" id="upd">載入中…</span>
</h1>
<div class="sub">資料直讀 GitHub（每次交易後自動更新）・每 5 分鐘自動重新整理</div>

<h2>💰 實盤 SOL_B（本金 $45 USDT）</h2>
<div class="grid tiles" id="live-tiles"></div>

<h2>🏁 出場規則 A/B 賽場（紙上・虛擬 $1000・同訊號源）</h2>
<div class="grid race" id="race"></div>
<div class="sub" style="margin:8px 0 10px">判定規則：滿 40 筆或報酬差 ±3% 先到者為準；勝者先以 50% 資金切換實盤驗證</div>
<div id="chartwrap">
  <div style="font-size:.8rem;color:var(--ink2);margin-bottom:8px">資金曲線（虛擬 $1000 起）<span id="chart-note" style="color:var(--ink3)"></span></div>
  <svg id="equity-chart" width="1000" height="260" role="img" aria-label="三版本資金曲線"></svg>
</div>

<h2>👀 其他觀察倉</h2>
<div class="grid race" id="others"></div>

<h2>📜 最近實盤交易</h2>
<div class="card" style="overflow-x:auto"><table id="trades"><thead>
<tr><th>時間(台灣)</th><th>動作</th><th>價格</th><th>損益%</th><th>真實損益</th><th>原因</th></tr>
</thead><tbody></tbody></table></div>

<footer>btc-trading-bot・原版=RSI62出場｜V2=62且獲利≥1%｜V3=RSI70出場</footer>

<script>
const RAW = "https://raw.githubusercontent.com/KevinYee-yee/btc-trading-bot/main/";
const CAP = 45, VBASE = 1000;
const S = {SOL_B:{c:"var(--s1)",n:"原版 RSI62"},SOL_B_V2:{c:"var(--s2)",n:"V2 62+獲利≥1%"},SOL_B_V3:{c:"var(--s3)",n:"V3 RSI70"}};
const j = async f => { try{ const r = await fetch(RAW+f+"?t="+Date.now()); return r.ok ? r.json() : null }catch(e){ return null } };
const t = async f => { try{ const r = await fetch(RAW+f+"?t="+Date.now()); return r.ok ? r.text() : "" }catch(e){ return "" } };
const pct = p => p.total_pnl/(VBASE/100);
const cls = v => v>0?"pos":v<0?"neg":"";
const tw = s => { const d=new Date(s.replace(" ","T")+":00Z"); return isNaN(d)?s:d.toLocaleString("zh-TW",{timeZone:"Asia/Taipei",month:"2-digit",day:"2-digit",hour:"2-digit",minute:"2-digit",hour12:false}) };

function tile(k,v,d,c){ return `<div class="tile"><div class="k">${k}</div><div class="v ${c||""}">${v}</div><div class="d">${d||""}</div></div>` }

function parseCsv(txt){
  const L = txt.trim().split("\n"); if(L.length<2) return [];
  const H = L[0].split(",");
  return L.slice(1).map(r=>{ const c=r.split(","); const o={}; H.forEach((h,i)=>o[h]=c[i]); return o });
}

async function refresh(){
  const [live, hb, liveCsv, pb, p2, p3, pa, pe] = await Promise.all([
    j("live_portfolio_sol_b.json"), t("live_heartbeat.txt"), t("live_trade_log_sol_b.csv"),
    j("paper_portfolio_sol_b.json"), j("paper_portfolio_sol_b_v2.json"), j("paper_portfolio_sol_b_v3.json"),
    j("paper_portfolio.json"), j("paper_portfolio_eth_b.json")
  ]);

  // 心跳健康燈
  const hbEl = document.getElementById("hb");
  if(hb){ const age=(Date.now()-new Date(hb.trim()))/60000;
    hbEl.textContent = age<20?`🟢 排程正常（${age.toFixed(0)}分前）`:`🔴 心跳停擺 ${age.toFixed(0)} 分`;
    hbEl.className = "pill "+(age<20?"ok":"bad"); }
  document.getElementById("upd").textContent = "更新 "+new Date().toLocaleTimeString("zh-TW",{hour12:false,timeZone:"Asia/Taipei"});

  // 實盤 tiles
  if(live){
    const real = live.total_pnl/VBASE*CAP, wr = live.total_trades?Math.round(live.wins/live.total_trades*100):0;
    const pos = live.position>0?`持倉 @$${live.entry_price.toFixed(2)}`:"空倉";
    const halt = live.halt_until && new Date(live.halt_until)>new Date() ? "🛑 風控停機" : "";
    document.getElementById("live-tiles").innerHTML =
      tile("真實累計損益", (real>=0?"+":"")+real.toFixed(2)+" U", pct(live).toFixed(2)+"%", cls(real)) +
      tile("交易 / 勝率", `${live.total_trades}筆 / ${wr}%`, "加碼門檻：20筆且勝率≥60%") +
      tile("目前狀態", halt||pos, halt?("至 "+live.halt_until.slice(5,16)):"") +
      tile("連敗計數", live.consecutive_losses+" / 3", "達3觸發熔斷");
  }

  // A/B 賽場
  const ps = {SOL_B:pb, SOL_B_V2:p2, SOL_B_V3:p3};
  let best=null,bv=-1e9;
  for(const k in ps){ if(ps[k]&&ps[k].total_trades>=5&&pct(ps[k])>bv){bv=pct(ps[k]);best=k} }
  document.getElementById("race").innerHTML = Object.keys(S).map(k=>{
    const p=ps[k]; if(!p) return `<div class="card"><div class="name"><span class="dot" style="background:${S[k].c}"></span>${S[k].n}</div><div class="meta">資料累積中…</div></div>`;
    const wr=p.total_trades?Math.round(p.wins/p.total_trades*100):0;
    return `<div class="card ${k===best?"lead":""}"><div class="name"><span class="dot" style="background:${S[k].c}"></span>${S[k].n} ${k===best?'<span class="tag">領先</span>':''}</div>
      <div class="ret ${cls(pct(p))}">${pct(p)>=0?"+":""}${pct(p).toFixed(2)}%</div>
      <div class="meta">${p.total_trades}筆・勝率${wr}%・${p.position>0?"持倉":"空倉"}</div></div>`;
  }).join("");

  // 其他觀察倉
  const oth = [["A（BTC 布林+MACD）",pa],["ETH_B（熔斷待修）",pe]];
  document.getElementById("others").innerHTML = oth.map(([n,p])=>{
    if(!p) return "";
    const wr=p.total_trades?Math.round(p.wins/p.total_trades*100):0;
    const cb=p.consecutive_losses>=3?' <span class="tag">🔴熔斷</span>':"";
    return `<div class="card"><div class="name">${n}${cb}</div><div class="ret ${cls(pct(p))}">${pct(p)>=0?"+":""}${pct(p).toFixed(2)}%</div><div class="meta">${p.total_trades}筆・勝率${wr}%</div></div>`;
  }).join("");

  // 實盤交易表
  const rows = parseCsv(liveCsv).slice(-10).reverse();
  document.querySelector("#trades tbody").innerHTML = rows.map(r=>{
    const v=parseFloat((r.pnl_pct||"").replace("%","")), real=isNaN(v)?"":((v>=0?"+":"")+(v/100*CAP).toFixed(2)+" U");
    return `<tr><td>${tw(r.time)}</td><td>${r.action==="BUY"?"買入":"賣出"}</td><td>$${parseFloat(r.price).toFixed(2)}</td>
      <td class="${isNaN(v)?"":cls(v)}">${r.pnl_pct||"—"}</td><td class="${isNaN(v)?"":cls(v)}">${real||"—"}</td><td>${r.reason||""}</td></tr>`;
  }).join("") || '<tr><td colspan="6">尚無紀錄</td></tr>';

  // 資金曲線（各版本 paper_trade_log）
  drawChart(await Promise.all(["paper_trade_log_sol_b.csv","paper_trade_log_sol_b_v2.csv","paper_trade_log_sol_b_v3.csv"].map(t)));
}

function drawChart(csvs){
  const svg=document.getElementById("equity-chart"), keys=Object.keys(S);
  const series=csvs.map(c=>parseCsv(c).filter(r=>r.action==="SELL").map(r=>({t:new Date(r.time.replace(" ","T")+":00Z"),v:parseFloat(r.capital_after)})));
  const all=series.flat();
  if(all.length<2){ document.getElementById("chart-note").textContent="（比賽剛開始，資金曲線待累積）"; svg.innerHTML=""; return }
  const W=1000,H=260,P={l:56,r:120,t:12,b:24};
  const xs=all.map(d=>d.t.getTime()), ys=all.map(d=>d.v).concat([VBASE]);
  const x0=Math.min(...xs),x1=Math.max(...xs),y0=Math.min(...ys)*0.998,y1=Math.max(...ys)*1.002;
  const X=v=>P.l+(v-x0)/(x1-x0||1)*(W-P.l-P.r), Y=v=>H-P.b-(v-y0)/(y1-y0||1)*(H-P.t-P.b);
  let g="";
  for(let i=0;i<=3;i++){ const yv=y0+(y1-y0)*i/3, y=Y(yv);
    g+=`<line x1="${P.l}" y1="${y}" x2="${W-P.r}" y2="${y}" stroke="var(--line)" stroke-width="1"/>
        <text x="${P.l-8}" y="${y+4}" fill="var(--ink3)" font-size="11" text-anchor="end">$${yv.toFixed(0)}</text>`}
  g+=`<line x1="${P.l}" y1="${Y(VBASE)}" x2="${W-P.r}" y2="${Y(VBASE)}" stroke="var(--ink3)" stroke-width="1" stroke-dasharray="4 4"/>`;
  series.forEach((s,i)=>{ if(!s.length) return;
    const pts=[{t:new Date(x0),v:VBASE},...s];
    const d=pts.map((p,j)=>(j?"L":"M")+X(p.t.getTime()).toFixed(1)+" "+Y(p.v).toFixed(1)).join(" ");
    const c=S[keys[i]].c, last=pts[pts.length-1];
    g+=`<path d="${d}" fill="none" stroke="${c}" stroke-width="2" stroke-linejoin="round"/>
        <circle cx="${X(last.t.getTime())}" cy="${Y(last.v)}" r="4" fill="${c}" stroke="var(--card)" stroke-width="2"/>
        <text x="${X(last.t.getTime())+8}" y="${Y(last.v)+4}" fill="var(--ink2)" font-size="11">${S[keys[i]].n} $${last.v.toFixed(0)}</text>`;
  });
  document.getElementById("chart-note").textContent="";
  svg.innerHTML=g;
}

refresh();
setInterval(refresh, 300000);
</script>
</body>
</html>
