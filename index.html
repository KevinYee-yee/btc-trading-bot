<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>BTC 監測</title>
<style>
  :root {
    --bg: #0d0d0d;
    --card: #1a1a1a;
    --border: #2a2a2a;
    --text: #e8e8e8;
    --sub: #888;
    --gold: #f5a623;
    --green: #34c759;
    --red: #ff3b30;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, "SF Pro Display", sans-serif; max-width: 480px; margin: 0 auto; padding: 0 0 40px; }

  /* Header */
  .header { padding: 20px 16px 14px; position: sticky; top: 0; background: var(--bg); z-index: 10; border-bottom: 1px solid var(--border); }
  .header-top { display: flex; justify-content: space-between; align-items: flex-start; }
  .header-label { font-size: 11px; color: var(--sub); letter-spacing: 0.5px; text-transform: uppercase; margin-bottom: 4px; }
  .btc-price { font-size: 36px; font-weight: 700; color: var(--gold); letter-spacing: -1px; line-height: 1; }
  .last-update { font-size: 11px; color: var(--sub); margin-top: 6px; }

  /* Refresh button */
  .refresh-btn {
    background: var(--card); border: 1px solid var(--border);
    color: var(--text); padding: 10px 16px; border-radius: 22px;
    font-size: 14px; cursor: pointer; display: flex; align-items: center;
    gap: 6px; white-space: nowrap; flex-shrink: 0; margin-top: 2px;
  }
  .refresh-btn:active { background: #252525; }
  .spin { display: inline-block; }
  .refresh-btn.loading .spin { animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Status banner */
  .status-banner { margin: 14px 16px 0; padding: 12px 16px; border-radius: 14px; display: flex; align-items: center; gap: 10px; }
  .status-banner.empty   { background: #1c1c1c; }
  .status-banner.holding { background: #0a2218; border: 1px solid #1a4a2e; }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .dot-empty   { background: #555; }
  .dot-holding { background: var(--green); box-shadow: 0 0 8px var(--green); }
  .status-text { font-size: 14px; font-weight: 600; }
  .status-sub  { font-size: 11px; color: var(--sub); margin-top: 2px; }

  /* Section */
  .section { padding: 20px 16px 0; }
  .section-label { font-size: 11px; color: var(--sub); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 10px; }

  /* Metric cards 2x3 grid */
  .cards { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .card { background: var(--card); border-radius: 14px; padding: 14px 16px; }
  .card-label { font-size: 11px; color: var(--sub); margin-bottom: 6px; }
  .card-value { font-size: 22px; font-weight: 700; line-height: 1.1; }
  .green { color: var(--green); }
  .red   { color: var(--red); }
  .gold  { color: var(--gold); }
  .white { color: #fff; }

  /* Monitor log — timeline style */
  .log-list { display: flex; flex-direction: column; gap: 8px; }
  .log-item { background: var(--card); border-radius: 14px; padding: 14px; display: flex; gap: 12px; align-items: flex-start; }
  .log-icon { font-size: 16px; flex-shrink: 0; margin-top: 1px; }
  .log-body { flex: 1; min-width: 0; }
  .log-time  { font-size: 11px; color: var(--sub); margin-bottom: 5px; }
  .log-row   { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
  .log-price { font-size: 17px; font-weight: 700; }
  .log-badge { font-size: 12px; font-weight: 600; padding: 3px 10px; border-radius: 8px; }
  .badge-wait   { background: #232323; color: #666; }
  .badge-signal { background: #3d2e00; color: var(--gold); }
  .log-meta { font-size: 11px; color: var(--sub); }

  /* Trade records */
  .trade-list { display: flex; flex-direction: column; gap: 8px; }
  .trade-item { background: var(--card); border-radius: 14px; padding: 14px; }
  .trade-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .trade-badge { font-size: 12px; font-weight: 700; padding: 3px 12px; border-radius: 8px; }
  .badge-buy       { background: #0a2218; color: var(--green); }
  .badge-sell-win  { background: #0a2218; color: var(--green); }
  .badge-sell-loss { background: #220a0a; color: var(--red); }
  .trade-time { font-size: 11px; color: var(--sub); }
  .trade-row { display: flex; justify-content: space-between; align-items: center; }
  .trade-price { font-size: 15px; font-weight: 600; }
  .trade-pnl   { font-size: 16px; font-weight: 700; }
  .trade-reason { font-size: 11px; color: var(--sub); margin-top: 6px; }

  .empty-state { text-align: center; padding: 30px; color: var(--sub); font-size: 13px; }

  @media (min-width: 520px) {
    body { max-width: 600px; }
    .cards { grid-template-columns: repeat(3, 1fr); }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div>
      <div class="header-label">BTC 策略A 監測</div>
      <div class="btc-price" id="btc-price">—</div>
      <div class="last-update" id="last-update">點擊更新取得最新資料</div>
    </div>
    <button class="refresh-btn" id="refresh-btn" onclick="doRefresh()">
      <span class="spin" id="spin-icon">↻</span>更新
    </button>
  </div>
</div>

<div id="status-banner" class="status-banner empty">
  <span class="status-dot dot-empty"></span>
  <div><div class="status-text" style="color:#666">載入中...</div></div>
</div>

<div class="section">
  <div class="section-label">帳戶概覽</div>
  <div class="cards">
    <div class="card">
      <div class="card-label">總資產（USDT）</div>
      <div class="card-value white" id="c-total">—</div>
      <div class="card-sub" id="c-total-sub">初始 $1,000</div>
    </div>
    <div class="card">
      <div class="card-label">現金餘額</div>
      <div class="card-value white" id="c-cash">—</div>
      <div class="card-sub" id="c-cash-sub">可用 USDT</div>
    </div>
    <div class="card">
      <div class="card-label">累計報酬</div>
      <div class="card-value white" id="c-return">—</div>
    </div>
    <div class="card">
      <div class="card-label">已實現損益</div>
      <div class="card-value white" id="c-pnl">—</div>
    </div>
    <div class="card">
      <div class="card-label">布林上軌</div>
      <div class="card-value white" id="c-upper" style="font-size:16px">—</div>
    </div>
    <div class="card">
      <div class="card-label">布林下軌</div>
      <div class="card-value white" id="c-lower" style="font-size:16px">—</div>
    </div>
    <div class="card">
      <div class="card-label">交易次數</div>
      <div class="card-value white" id="c-trades">—</div>
    </div>
    <div class="card">
      <div class="card-label">勝率</div>
      <div class="card-value white" id="c-wr">—</div>
    </div>
  </div>
</div>

<div class="section" style="margin-top:22px">
  <div class="section-label">最近監測（最新在上）</div>
  <div class="log-list" id="log-list">
    <div class="empty-state">載入中...</div>
  </div>
</div>

<div class="section" id="trade-section" style="margin-top:22px; display:none">
  <div class="section-label">交易紀錄</div>
  <div class="trade-list" id="trade-list"></div>
</div>

<script>
const GS_URL = "https://script.google.com/macros/s/AKfycbywcYNXYwDN6Z70F0-1nxVj6f3nzqyyoiugO_Mkiy5LPjXbFb5RP126d79VgqjnWlwJ/exec";

function toTW(utcStr) {
  if (!utcStr) return "—";
  try {
    const d = new Date(String(utcStr).replace(" ", "T") + (String(utcStr).includes("Z") ? "" : "Z"));
    return d.toLocaleString("zh-TW", { timeZone: "Asia/Taipei", month: "numeric", day: "numeric", hour: "2-digit", minute: "2-digit", hour12: false });
  } catch(e) { return utcStr; }
}

function render(data) {
  const d      = data.dashboard || {};
  const logs   = data.logs      || [];
  const trades = data.trades    || [];

  document.getElementById("btc-price").textContent = d["BTC 現價"] || "—";
  document.getElementById("last-update").textContent =
    "資料時間：" + toTW(d["最後更新"]) + " 台灣時間";

  const pos = d["持倉狀態"] || "空倉中";
  const isHolding = pos !== "空倉中";
  const banner = document.getElementById("status-banner");
  if (isHolding) {
    banner.className = "status-banner holding";
    banner.innerHTML = `<span class="status-dot dot-holding"></span>
      <div><div class="status-text green">持倉中</div>
      <div class="status-sub">${pos}</div></div>`;
  } else {
    banner.className = "status-banner empty";
    banner.innerHTML = `<span class="status-dot dot-empty"></span>
      <div><div class="status-text" style="color:#aaa">空倉中</div>
      <div class="status-sub">等待布林下軌 + MACD 交叉訊號</div></div>`;
  }

  const retStr = d["累計報酬"] || "0%";
  const retN   = parseFloat(retStr);
  const pnlStr = d["累計已實現損益"] || "$0.00";
  const pnlN   = parseFloat(String(pnlStr).replace(/[$,]/g,""));

  // 總資產 = 初始 $1000 × (1 + 報酬率)
  const totalAssets = (1000 * (1 + retN / 100)).toFixed(2);
  const totalFmt    = "$" + parseFloat(totalAssets).toLocaleString("en-US", {minimumFractionDigits: 2, maximumFractionDigits: 2});
  document.getElementById("c-total").textContent   = totalFmt;
  document.getElementById("c-total").className     = "card-value " + (retN >= 0 ? "green" : "red");
  document.getElementById("c-total-sub").textContent = retN >= 0
    ? "+" + retStr.replace("+","") + " 較初始"
    : retStr + " 較初始";

  // 現金餘額
  const cashRaw = d["現金餘額"];
  const isHoldingCash = !cashRaw || cashRaw === "—";
  document.getElementById("c-cash").textContent  = isHoldingCash ? "持倉中" : cashRaw;
  document.getElementById("c-cash").className    = "card-value " + (isHoldingCash ? "gold" : "white");
  document.getElementById("c-cash-sub").textContent = isHoldingCash ? "資金已買入 BTC" : "可用 USDT";

  document.getElementById("c-return").textContent = retStr;
  document.getElementById("c-return").className   = "card-value " + (retN >= 0 ? "green" : "red");
  document.getElementById("c-pnl").textContent    = pnlStr;
  document.getElementById("c-pnl").className      = "card-value " + (pnlN >= 0 ? "green" : "red");
  document.getElementById("c-upper").textContent  = d["布林上軌"] || "—";
  document.getElementById("c-lower").textContent  = d["布林下軌"] || "—";
  document.getElementById("c-trades").textContent = d["總交易次數"] || "0";
  document.getElementById("c-wr").textContent     = d["勝率"] || "—";

  const logEl = document.getElementById("log-list");
  if (!logs.length) {
    logEl.innerHTML = '<div class="empty-state">尚無監測資料</div>';
  } else {
    logEl.innerHTML = logs.map(r => {
      const hasSignal = r[7] && r[7] !== "無訊號";
      const priceFmt = "$" + parseFloat(r[1] || 0).toLocaleString("en-US", {maximumFractionDigits: 0});
      return `<div class="log-item">
        <div class="log-icon">${hasSignal ? "⚡" : "·"}</div>
        <div class="log-body">
          <div class="log-time">${toTW(r[0])}</div>
          <div class="log-row">
            <span class="log-price">${priceFmt}</span>
            <span class="log-badge ${hasSignal ? "badge-signal" : "badge-wait"}">${hasSignal ? r[7] : "待機"}</span>
          </div>
          <div class="log-meta">下軌 ${r[5]} &nbsp;·&nbsp; MACD ${r[6]}</div>
        </div>
      </div>`;
    }).join("");
  }

  const tradeSection = document.getElementById("trade-section");
  const tradeEl      = document.getElementById("trade-list");
  if (!trades.length) {
    tradeSection.style.display = "none";
  } else {
    tradeSection.style.display = "block";
    tradeEl.innerHTML = trades.map(r => {
      const isBuy  = r[1] === "BUY";
      const pnlPct = r[4] || "";
      const isWin  = pnlPct.startsWith("+");
      const badgeCls = isBuy ? "badge-buy" : (isWin ? "badge-sell-win" : "badge-sell-loss");
      const pnlCls   = isBuy ? "white" : (isWin ? "green" : "red");
      const priceFmt = "$" + parseFloat(r[2] || 0).toLocaleString("en-US", {maximumFractionDigits: 0});
      return `<div class="trade-item">
        <div class="trade-header">
          <span class="trade-badge ${badgeCls}">${isBuy ? "買入" : "賣出"}</span>
          <span class="trade-time">${toTW(r[0])}</span>
        </div>
        <div class="trade-row">
          <span class="trade-price">${priceFmt}</span>
          <span class="trade-pnl ${pnlCls}">${isBuy ? "進場" : (pnlPct || "—")}</span>
        </div>
        ${r[6] ? `<div class="trade-reason">${r[6]}</div>` : ""}
      </div>`;
    }).join("");
  }
}

let loading = false;
async function doRefresh() {
  if (loading) return;
  loading = true;
  document.getElementById("refresh-btn").classList.add("loading");
  document.getElementById("last-update").textContent = "更新中...";
  try {
    const resp = await fetch(GS_URL + "?t=" + Date.now());
    const data = await resp.json();
    render(data);
  } catch(e) {
    document.getElementById("last-update").textContent = "⚠️ 連線失敗，請再試";
  }
  loading = false;
  document.getElementById("refresh-btn").classList.remove("loading");
}

doRefresh();
setInterval(doRefresh, 300000);
</script>
</body>
</html>
