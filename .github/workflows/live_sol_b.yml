name: 🔴 SOL_B 實盤交易 OKX

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:
    inputs:
      force_test:
        description: '強制測試 (buy / sell / 留空)'
        required: false
        default: ''

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  live:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    # 總開關：repo variable LIVE_SOL_B 設為 on 才會真正執行
    # 關閉方式：gh variable set LIVE_SOL_B -b off（或建立 emergency_stop 檔案）
    if: ${{ vars.LIVE_SOL_B == 'on' }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install ccxt pandas numpy

      - name: Run SOL Strategy B (LIVE)
        env:
          STRATEGY:         B
          SYMBOL:           SOL/USDT
          LIVE_TRADE:       "true"
          LIVE_CAPITAL:     ${{ vars.LIVE_CAPITAL_SOL_B || '45' }}
          OKX_API_KEY:      ${{ secrets.OKX_API_KEY }}
          OKX_SECRET:       ${{ secrets.OKX_SECRET }}
          OKX_PASSPHRASE:   ${{ secrets.OKX_PASSPHRASE }}
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GS_WEBHOOK:       ${{ secrets.GS_WEBHOOK }}
          FORCE_TEST:       ${{ github.event.inputs.force_test }}
        run: python monitor.py

      - name: Commit live state + heartbeat
        run: |
          date -u '+%Y-%m-%dT%H:%M:%SZ' > live_heartbeat.txt
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add live_heartbeat.txt
          git add live_portfolio_sol_b.json 2>/dev/null || true
          git add live_trade_log_sol_b.csv 2>/dev/null || true
          git diff --cached --quiet || git commit -m "🔴LIVE SOL-B $(date -u '+%Y-%m-%d %H:%M UTC')"
          git pull --rebase origin main
          git push || (git pull --rebase origin main && git push)

      - name: 失敗即時告警
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="🚨【實盤】SOL_B workflow 執行失敗！請查看 GitHub Actions：https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
