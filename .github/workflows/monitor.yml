name: 策略A 紙上交易監測

on:
  schedule:
    # 【測試模式】每 30 分鐘一次 — 測完記得改回 4H
    - cron: "*/10 * * * *"
  workflow_dispatch:
    inputs:
      force_test:
        description: '強制測試模式 (buy / sell / 留空=正常)'
        required: false
        default: ''

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # 允許寫入 paper_portfolio.json 和 trade_log.csv

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install ccxt pandas numpy

      - name: Run strategy monitor
        env:
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GS_WEBHOOK:       ${{ secrets.GS_WEBHOOK }}
          FORCE_TEST:       ${{ github.event.inputs.force_test }}
        run: python monitor.py

      - name: Commit updated portfolio state
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add paper_portfolio.json
          git add trade_log.csv 2>/dev/null || true
          git diff --cached --quiet || git commit -m "📊 $(date -u '+%Y-%m-%d %H:%M UTC') 自動更新帳戶狀態"
          git pull --rebase origin main
          git push
