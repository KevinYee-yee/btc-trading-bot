name: BTC做空策略 EMA死叉

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:
    inputs:
      force_test:
        description: '強制測試 (short / cover / 留空)'
        required: false
        default: ''

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install ccxt pandas numpy

      - name: Run Short Strategy
        env:
          SYMBOL:           BTC/USDT
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GS_WEBHOOK:       ${{ secrets.GS_WEBHOOK }}
          FORCE_TEST:       ${{ github.event.inputs.force_test }}
        run: python monitor_short.py

      - name: Commit portfolio state
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add paper_portfolio_short.json
          git add trade_log_short.csv 2>/dev/null || true
          git diff --cached --quiet || git commit -m "📊SHORT $(date -u '+%Y-%m-%d %H:%M UTC') 做空策略更新"
          for i in 1 2 3 4 5; do
            git pull --rebase origin main || true
            if git push; then exit 0; fi
            sleep $((RANDOM % 8 + 2))
          done
          echo "::warning::推送重試5次失敗，本輪狀態未上傳（下輪自動補）"
          exit 1
