name: SOL 策略B RSI超賣 紙上交易

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:
    inputs:
      force_test:
        description: '強制測試 (buy / sell / 留空)'
        required: false
        default: ''

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install ccxt pandas numpy

      - name: Run SOL Strategy B
        env:
          STRATEGY:         B
          SYMBOL:           SOL/USDT
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GS_WEBHOOK:       ${{ secrets.GS_WEBHOOK }}
          FORCE_TEST:       ${{ github.event.inputs.force_test }}
        run: python monitor.py

      - name: Commit portfolio state
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add paper_portfolio_sol_b.json
          git add trade_log_sol_b.csv 2>/dev/null || true
          git diff --cached --quiet || git commit -m "📊SOL-B $(date -u '+%Y-%m-%d %H:%M UTC') 更新"
          git pull --rebase origin main
          git push || (git pull --rebase origin main && git push)
