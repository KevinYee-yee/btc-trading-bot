<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>BTC 策略監測</title>
<style>
  :root {
    --bg: #0d0d0d; --card: #1a1a1a; --border: #2a2a2a;
    --text: #e8e8e8; --sub: #888; --gold: #f5a623;
    --green: #34c759; --red: #ff3b30;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, "SF Pro Display", sans-serif; max-width: 480px; margin: 0 auto; padding: 0 0 40px; }

  /* Header */
  .header { padding: 16px 16px 12px; position: sticky; top: 0; background: var(--bg); z-index: 20; border-bottom: 1px solid var(--border); }
  .header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .header-title { font-size: 12px; color: var(--sub); text-transform: uppercase; letter-spacing: 0.5px; }
  .btc-price { font-size: 30px; font-weight: 700; color: var(--gold); }
  .last-update { font-size: 11px; color: var(--sub); margin-top: 2px; }
  .refresh-btn { background: var(--card); border: 1px solid var(--border); color: var(--text); padding: 8px 14px; border-radius: 20px; font-size: 13px; cursor: pointer; display: flex; align-items: center; gap: 5px; }
  .refresh-btn:active { background: #252525; }
  .spin { display: inline-block; }
  .refresh-btn.loading .spin { animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Tab bar */
  .tabs { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 2px; }
  .tabs::-webkit-scrollbar { display: none; }
  .tab { padding: 6px 14px; border-radius: 16px; font-size: 13px; font-weight: 600; cursor: pointer; white-space: nowrap; border: 1px solid var(--border); color: var(--sub); background: transparent; flex-shrink: 0; }
  .tab.active { background: var(--gold); color: #000; border-color: var(--gold); }

  /* Comparison grid (overview tab) */
  .overview-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 16px; }
  .ov-card { background: var(--card); border-radius: 14px; padding: 14px; cursor: pointer; }
  .ov-card:active { background: #222; }
  .ov-label { font-size: 11px; color: var(--sub); margin-bottom: 4px; }
  .ov-name  { font-size: 13px; font-weight: 700; margin-bottom: 8px; }
  .ov-return { font-size: 22px; font-weight: 700; }
  .ov-trades { font-size: 11px; color: var(--sub); margin-top: 4px; }
  .ov-status { font-size: 11px; margin-top: 6px; padding: 3px 8px; border-radius: 6px; display: inline-block; }
  .ov-status.holding { background: #0a2218; color: var(--green); }
  .ov-status.empty   { background: #1e1e1e; color: var(--sub); }

  /* Strategy detail view */
  .section { padding: 16px 16px 0; }
  .section-label { font-size: 11px; color: var(--sub); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 10px; }

  .status-banner { margin: 12px 16px 0; padding: 12px 16px; border-radius: 14px; display: flex; align-items: center; gap: 10px; }
  .status-banner.empty   { background: #1c1c1c; }
  .status-banner.holding { background: #0a2218; border: 1px solid #1a4a2e; }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .dot-empty   { background: #555; }
  .dot-holding { background: var(--green); box-shadow: 0 0 8px var(--green); }
  .status-text { font-size: 14px; font-weight: 600; }
  .status-sub  { font-size: 11px; color: var(--sub); margin-top: 2px; }

  .cards { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .card { background: var(--card); border-radius: 14px; padding: 14px 16px; }
  .card-label { font-size: 11px; color: var(--sub); margin-bottom: 6px; }
  .card-value { font-size: 21px; font-weight: 700; line-height: 1.1; }
  .card-sub   { font-size: 11px; color: var(--sub); margin-top: 4px; }
  .green { color: var(--green); } .red { color: var(--red); } .gold { color: var(--gold); } .white { color: #fff; }

  .log-list { display: flex; flex-direction: column; gap: 8px; }
  .log-item { background: var(--card); border-radius: 14px; padding: 14px; display: flex; gap: 12px; }
  .log-icon { font-size: 15px; flex-shrink: 0; margin-top: 1px; }
  .log-body { flex: 1; }
  .log-time  { font-size: 11px; color: var(--sub); margin-bottom: 4px; }
  .log-row   { display: flex; justify-content: space-between; align-items: center; margin-bottom: 3px; }
  .log-price { font-size: 16px; font-weight: 700; }
  .log-badge { font-size: 12px; font-weight: 600; padding: 2px 9px; border-radius: 7px; }
  .badge-wait   { background: #222; color: #666; }
  .badge-signal { background: #3d2e00; color: var(--gold); }
  .log-meta { font-size: 11px; color: var(--sub); }

  .trade-list { display: flex; flex-direction: column; gap: 8px; }
  .trade-item { background: var(--card); border-radius: 14px; padding: 14px; }
  .trade-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 7px; }
  .trade-badge { font-size: 12px; font-weight: 700; padding: 3px 11px; border-radius: 7px; }
  .badge-buy       { background: #0a2218; color: var(--green); }
  .badge-sell-win  { background: #0a2218; color: var(--green); }
  .badge-sell-loss { background: #220a0a; color: var(--red); }
  .trade-time { font-size: 11px; color: var(--sub); }
  .trade-row { display: flex; justify-content: space-between; }
  .trade-price { font-size: 15px; font-weight: 600; }
  .trade-pnl   { font-size: 16px; font-weight: 700; }
  .trade-reason { font-size: 11px; color: var(--sub); margin-top: 5px; }

  .empty-state { text-align: center; padding: 28px; color: var(--sub); font-size: 13px; }
  .hidden { display: none !important; }

  @media (min-width: 520px) { body { max-width: 600px; } .cards { grid-template-columns: repeat(3, 1fr); } }
</style>
</head>
<body>

<div class="header">
  <div class="header-row">
    <div>
      <div class="header-title">BTC 策略 A/B/C/D 監測</div>
      <div class="btc-price" id="btc-price">—</div>
      <div class="last-update" id="last-update">點擊更新</div>
    </div>
    <button class="refresh-btn" id="refresh-btn" onclick="doRefresh()">
      <span class="spin">↻</span>更新
    </button>
  </div>
  <div class="tabs" id="tabs">
    <div class="tab active" onclick="switchTab('overview')">總覽</div>
    <div class="tab" onclick="switchTab('A')">策略A</div>
    <div class="tab" onclick="switchTab('B')">策略B</div>
    <div class="tab" onclick="switchTab('C')">策略C</div>
    <div class="tab" onclick="switchTab('D')">策略D</div>
  </div>
</div>

<!-- 總覽 -->
<div id="view-overview">
  <div class="overview-grid" id="overview-grid">
    <div class="empty-state" style="grid-column:1/-1">載入中...</div>
  </div>
</div>

<!-- 策略詳細頁（A/B/C/D 共用模板） -->
<div id="view-detail" class="hidden">
  <div id="status-banner" class="status-banner empty">
    <span class="status-dot dot-empty"></span>
    <div><div class="status-text" style="color:#666">載入中...</div></div>
  </div>

  <div class="section" style="margin-top:16px">
    <div class="section-label" id="strategy-name-label">帳戶概覽</div>
    <div class="cards">
      <div class="card"><div class="card-label">總資產</div><div class="card-value white" id="c-total">—</div><div class="card-sub" id="c-total-sub">初始 $1,000</div></div>
      <div class="card"><div class="card-label">現金餘額</div><div class="card-value white" id="c-cash">—</div><div class="card-sub" id="c-cash-sub">可用 USDT</div></div>
      <div class="card"><div class="card-label">累計報酬</div><div class="card-value white" id="c-return">—</div></div>
      <div class="card"><div class="card-label">已實現損益</div><div class="card-value white" id="c-pnl">—</div></div>
      <div class="card"><div class="card-label">交易次數</div><div class="card-value white" id="c-trades">—</div></div>
      <div class="card"><div class="card-label">勝率</div><div class="card-value white" id="c-wr">—</div></div>
    </div>
  </div>

  <div class="section" style="margin-top:20px">
    <div class="section-label">最近監測</div>
    <div class="log-list" id="log-list"><div class="empty-state">載入中...</div></div>
  </div>

  <div class="section" id="trade-section" style="margin-top:20px; display:none">
    <div class="section-label">交易紀錄</div>
    <div class="trade-list" id="trade-list"></div>
  </div>
</div>

<script>
const GS_URL = "https://script.google.com/macros/s/AKfycbywcYNXYwDN6Z70F0-1nxVj6f3nzqyyoiugO_Mkiy5LPjXbFb5RP126d79VgqjnWlwJ/exec";
const STRATEGY_LABELS = { A:"布林+MACD", B:"RSI超賣", C:"EMA交叉", D:"MACD零軸" };

let allData = null;
let activeTab = "overview";

function toTW(utcStr) {
  if (!utcStr) return "—";
  try {
    const d = new Date(String(utcStr).replace(" ","T") + (String(utcStr).includes("Z") ? "" : "Z"));
    return d.toLocaleString("zh-TW", { timeZone:"Asia/Taipei", month:"numeric", day:"numeric", hour:"2-digit", minute:"2-digit", hour12:false });
  } catch(e) { return utcStr; }
}

function switchTab(tab) {
  activeTab = tab;
  document.querySelectorAll(".tab").forEach((el, i) => {
    const labels = ["overview","A","B","C","D"];
    el.classList.toggle("active", labels[i] === tab);
  });
  document.getElementById("view-overview").classList.toggle("hidden", tab !== "overview");
  document.getElementById("view-detail").classList.toggle("hidden", tab === "overview");
  if (allData && tab !== "overview") renderDetail(tab);
}

function renderOverview(data) {
  const priceA = data.A?.dashboard?.["BTC 現價"] || "—";
  document.getElementById("btc-price").textContent = priceA;
  document.getElementById("last-update").textContent =
    "資料時間：" + toTW(data.A?.dashboard?.["最後更新"]) + " 台灣時間";

  const grid = document.getElementById("overview-grid");
  grid.innerHTML = ["A","B","C","D"].map(s => {
    const d   = data[s]?.dashboard || {};
    const ret = d["累計報酬"] || "0%";
    const retN = parseFloat(ret);
    const cls  = retN > 0 ? "green" : retN < 0 ? "red" : "white";
    const pos  = d["持倉狀態"] || "空倉中";
    const isHolding = pos !== "空倉中";
    const trades = d["總交易次數"] || 0;
    const wr     = d["勝率"] || "—";
    return `<div class="ov-card" onclick="switchTab('${s}')">
      <div class="ov-label">策略${s}</div>
      <div class="ov-name">${STRATEGY_LABELS[s]}</div>
      <div class="ov-return ${cls}">${ret}</div>
      <div class="ov-trades">${trades} 筆 · 勝率 ${wr}</div>
      <div class="ov-status ${isHolding ? 'holding':'empty'}">${isHolding ? '持倉中' : '空倉'}</div>
    </div>`;
  }).join("");
}

function renderDetail(s) {
  const data   = allData[s] || {};
  const d      = data.dashboard || {};
  const logs   = data.logs   || [];
  const trades = data.trades || [];

  document.getElementById("strategy-name-label").textContent =
    `策略${s}：${STRATEGY_LABELS[s]} — 帳戶概覽`;

  const pos = d["持倉狀態"] || "空倉中";
  const isHolding = pos !== "空倉中";
  const banner = document.getElementById("status-banner");
  if (isHolding) {
    banner.className = "status-banner holding";
    banner.innerHTML = `<span class="status-dot dot-holding"></span>
      <div><div class="status-text green">持倉中</div><div class="status-sub">${pos}</div></div>`;
  } else {
    banner.className = "status-banner empty";
    banner.innerHTML = `<span class="status-dot dot-empty"></span>
      <div><div class="status-text" style="color:#aaa">空倉中</div>
      <div class="status-sub">等待進場訊號</div></div>`;
  }

  const retStr = d["累計報酬"] || "0%";
  const retN   = parseFloat(retStr);
  const pnlStr = d["累計已實現損益"] || "$0.00";
  const pnlN   = parseFloat(String(pnlStr).replace(/[$,]/g,""));
  const totalAssets = (1000 * (1 + retN / 100)).toFixed(2);

  document.getElementById("c-total").textContent    = "$" + parseFloat(totalAssets).toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2});
  document.getElementById("c-total").className      = "card-value " + (retN >= 0 ? "green" : "red");
  document.getElementById("c-total-sub").textContent = (retN >= 0 ? "+" : "") + retStr + " 較初始";
  const cashRaw = d["現金餘額"];
  const nocash  = !cashRaw || cashRaw === "—";
  document.getElementById("c-cash").textContent     = nocash ? "持倉中" : cashRaw;
  document.getElementById("c-cash").className       = "card-value " + (nocash ? "gold" : "white");
  document.getElementById("c-cash-sub").textContent = nocash ? "資金已買入 BTC" : "可用 USDT";
  document.getElementById("c-return").textContent   = retStr;
  document.getElementById("c-return").className     = "card-value " + (retN >= 0 ? "green" : "red");
  document.getElementById("c-pnl").textContent      = pnlStr;
  document.getElementById("c-pnl").className        = "card-value " + (pnlN >= 0 ? "green" : "red");
  document.getElementById("c-trades").textContent   = d["總交易次數"] || "0";
  document.getElementById("c-wr").textContent       = d["勝率"] || "—";

  const logEl = document.getElementById("log-list");
  if (!logs.length) {
    logEl.innerHTML = '<div class="empty-state">尚無監測資料</div>';
  } else {
    logEl.innerHTML = logs.map(r => {
      const hasSignal = r[7] && r[7] !== "無訊號";
      const priceFmt = "$" + parseFloat(r[1]||0).toLocaleString("en-US",{maximumFractionDigits:0});
      return `<div class="log-item">
        <div class="log-icon">${hasSignal ? "⚡" : "·"}</div>
        <div class="log-body">
          <div class="log-time">${toTW(r[0])}</div>
          <div class="log-row">
            <span class="log-price">${priceFmt}</span>
            <span class="log-badge ${hasSignal ? "badge-signal":"badge-wait"}">${hasSignal ? r[7] : "待機"}</span>
          </div>
          <div class="log-meta">${r[5]} &nbsp;·&nbsp; ${r[6]}</div>
        </div>
      </div>`;
    }).join("");
  }

  const tradeSection = document.getElementById("trade-section");
  const tradeEl      = document.getElementById("trade-list");
  if (!trades.length) {
    tradeSection.style.display = "none";
  } else {
    tradeSection.style.display = "block";
    tradeEl.innerHTML = trades.map(r => {
      const isBuy  = r[1] === "BUY";
      const pnlPct = r[4] || "";
      const isWin  = pnlPct.startsWith("+");
      const badgeCls = isBuy ? "badge-buy" : (isWin ? "badge-sell-win" : "badge-sell-loss");
      const pnlCls   = isBuy ? "white" : (isWin ? "green" : "red");
      const priceFmt = "$" + parseFloat(r[2]||0).toLocaleString("en-US",{maximumFractionDigits:0});
      return `<div class="trade-item">
        <div class="trade-header">
          <span class="trade-badge ${badgeCls}">${isBuy ? "買入" : "賣出"}</span>
          <span class="trade-time">${toTW(r[0])}</span>
        </div>
        <div class="trade-row">
          <span class="trade-price">${priceFmt}</span>
          <span class="trade-pnl ${pnlCls}">${isBuy ? "進場" : (pnlPct || "—")}</span>
        </div>
        ${r[6] ? `<div class="trade-reason">${r[6]}</div>` : ""}
      </div>`;
    }).join("");
  }
}

let loading = false;
async function doRefresh() {
  if (loading) return;
  loading = true;
  document.getElementById("refresh-btn").classList.add("loading");
  document.getElementById("last-update").textContent = "更新中...";
  try {
    const resp = await fetch(GS_URL + "?t=" + Date.now());
    allData = await resp.json();
    renderOverview(allData);
    if (activeTab !== "overview") renderDetail(activeTab);
    document.getElementById("last-update").textContent =
      "資料時間：" + toTW(allData.A?.dashboard?.["最後更新"]) + " 台灣時間";
  } catch(e) {
    document.getElementById("last-update").textContent = "⚠️ 連線失敗，請再試";
  }
  loading = false;
  document.getElementById("refresh-btn").classList.remove("loading");
}

doRefresh();
setInterval(doRefresh, 300000);
</script>
</body>
</html>
